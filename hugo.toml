baseURL = 'https://blog.jasonwu.ai/'
languageCode = 'en-us'
title = 'Jason Wu — AI Engineering Blog'
theme = 'simple-blog'
enableRobotsTXT = true
enableGitInfo = true

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[outputFormats.RSS]
  mediatype = 'application/rss+xml'
  baseName = 'index'

[pagination]
  pagerSize = 10

[params]
  description = 'Building AI agents in production. Real problems, real solutions.'
  author = 'Jason Wu'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 2
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 3
